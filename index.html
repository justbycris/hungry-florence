<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Hungry Florence | 2D Game</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@v3.90.0/dist/phaser.js"></script>
    <link rel="icon" href="/assets//icon.png">
    <script src="script.js"></script>
    <title>Hungry Florence! 🐱🐟</title>
    
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a1a;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-flow: column;
    /* Safari specific */
    height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    box-sizing: border-box;
  }

  canvas {
    display: block;
    max-width: 100%;
    max-height: 100dvh;
    touch-action: none;
  }
</style>
</head>
